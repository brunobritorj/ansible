---
- name: Install a list of packages
  hosts: "{{ output_ip_address.state.ip_address }}"
  sudo: yes
  tasks:
  - name: Install Apache
    apt: name=apache2 state=latest
  - name: Install PHP
    apt: name=php state=latest
  - name: Install Biblioteca Apache-PHP
    apt: name=libapache2-mod-php state=latest